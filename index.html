<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Brian Park</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fff
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1rem
        }

        header {
            text-align: center;
            margin-bottom: 3rem
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: .5rem
        }

        .subtitle {
            color: #666;
            font-size: 1.1rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 1rem;
        }

        .social-link {
            display: inline-block;
            color: #333;
            transition: transform .2s, opacity .2s;
        }

        .social-link:hover {
            transform: translateY(-2px);
            opacity: .8;
        }

        .social-link svg {
            width: 24px;
            height: 24px;
        }

        .profile-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .profile-img-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: .5rem;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, .3);
        }

        .profile-img {
            height: 12rem;
        }

        .resume-section {
            display: flex;
            justify-content: center;
            margin-bottom: 3rem;
        }

        .resume {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .resume-img {
            max-width: 600px;
            width: 100%;
            height: auto;
            display: block;
            border-radius: 4px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, .1);
            transition: transform .2s, box-shadow .2s
        }

        .resume-img:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, .15)
        }

        .projects {
            display: grid;
            grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem
        }

        .project {
            background: #f8f9fa;
            border-radius: 8px;
            overflow: hidden;
            transition: transform .2s, box-shadow .2s
        }

        .project:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, .1)
        }

        .project-link {
            display: block;
            text-decoration: none;
            color: inherit
        }

        .project-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block
        }

        .project-info {
            padding: 1.5rem
        }

        .project-title {
            font-size: 1.3rem;
            margin-bottom: .5rem;
            color: #222
        }

        .project-desc {
            color: #666;
            font-size: .95rem
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem
            }

            .projects {
                grid-template-columns:1fr
            }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Brian Park</h1>
        <section class="profile-section">
            <div class="profile-img-container">
                <img src="images/chopped_16x16.webp" alt="chopped_brian_picture" class="profile-img"/>
            </div>
        </section>
        <p class="subtitle">Software Engineer?</p>
        <div class="social-links">
            <a href="https://github.com/cheekane" target="_blank" rel="noopener" class="social-link"
               aria-label="GitHub">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
                </svg>
            </a>
            <a href="https://linkedin.com/in/brianpark1101" target="_blank" rel="noopener" class="social-link"
               aria-label="LinkedIn">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
                </svg>
            </a>
        </div>
    </header>
    <section class="projects" id="projects"></section>
</div>
<script>
    const projects = [
        {
            title: "LondonKPC EM Website",
            desc: "Our church's website",
            img: "images/londonkpc.webp",
            url: "https://d28ok6bsrcpsar.cloudfront.net/"
        },
        {
            title: "TeeTimeBooker",
            desc: "Automatic golf tee time booking service",
            img: "images/teetime.webp",
            url: "https://github.com/mandutree/teetimebooker"
        },
    ];
    const container = document.getElementById("projects");
    projects.forEach(p => {
        const div = document.createElement("div");
        div.className = "project";
        div.innerHTML = `<a href="${p.url}" target="_blank" rel="noopener" class="project-link"><img src="${p.img}" alt="${p.title}" class="project-img" loading="lazy"><div class="project-info"><h2 class="project-title">${p.title}</h2><p class="project-desc">${p.desc}</p></div></a>`;
        container.appendChild(div);
    });
</script>
<section class="resume-section" id="resume">
    <div class="resume">
        <a href="https://drive.google.com/file/d/1Y_JFLjBxvonJXEGCM_qJ4QeDxm9ZgFov/view?usp=drive_link"
           target="_blank" rel="noopener" class="">
            <img src="images/resume.webp" alt="brian_park_resume" class="resume-img" loading="lazy">
        </a>
    </div>
</section>
</body>
</html>
